version: "3.8"

services:
  # 1. Container Model ML
  model-serving:
    build: .
    container_name: msml_model
    ports:
      - "5001:5001"
    restart: always

  # 2. Container Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: msml_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    depends_on:
      - model-serving

  # 3. Container Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: msml_grafana
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - prometheus
