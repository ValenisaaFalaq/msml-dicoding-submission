name: Automate Data Preprocessing

# Workflow ini akan berjalan setiap kali ada 'push' ke branch main atau master
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-process:
    # Kita menggunakan server Ubuntu virtual dari GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil seluruh kodemu dari repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Menyiapkan environment Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Meng-install library yang dibutuhkan (sesuaikan jika ada tambahan)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      # 4. Menjalankan script automasi milikmu
      - name: Run Preprocessing Script
        run: python src/automate_preprocessing.py

      # 5. Menyimpan output dataset_clean.csv sebagai artefak yang bisa diunduh
      - name: Upload Clean Dataset Artifact
        uses: actions/upload-artifact@v3
        with:
          name: cleaned-dataset
          path: data/processed/dataset_clean.csv
